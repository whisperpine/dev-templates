name: Checks

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  typos:
    runs-on: ubuntu-latest
    name: check misspelling by typos
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - name: Run typos command
        shell: nix shell nixpkgs#typos --quiet --command bash {0}
        run: typos --hidden --exclude .git --format brief

  nix-flake-check:
    runs-on: ubuntu-latest
    name: nix flake check
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - name: Run nix command
        run: nix flake check --all-systems

  cocogitto:
    runs-on: ubuntu-latest
    name: check conventional commits
    # Only run this step in the main branch.
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - name: Check the latest commit message
        shell: nix shell nixpkgs#cocogitto --quiet --command bash {0}
        run: cog check HEAD..HEAD

  trivy-scan:
    name: use trivy to scan files
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - name: Run Trivy vulnerability scanner in repo mode
        shell: nix shell nixpkgs#trivy --quiet --command bash {0}
        run: |
          trivy --quiet fs . \
            --output trivy-fs-results.sarif \
            --severity CRITICAL,HIGH,MEDIUM \
            --skip-dirs ./target \
            --format sarif \
            --exit-code 1
          trivy --quiet config . \
            --output trivy-config-results.sarif \
            --severity CRITICAL,HIGH,MEDIUM \
            --skip-dirs ./target \
            --format sarif \
            --exit-code 1
      - name: Upload "trivy fs" results to GitHub Security tab
        if: ${{ success() || failure() }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-fs-scan
      - name: Upload "trivy config" results to GitHub Security tab
        if: ${{ success() || failure() }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-config-results.sarif
          category: trivy-config-scan
